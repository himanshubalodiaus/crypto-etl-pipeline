name: CI

# Run on every push and every pull request to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff (real errors only)
        # Only fails the build on genuine bugs (undefined names, syntax errors),
        # not on style opinions — keeps the badge meaningful without nitpicking.
        run: ruff check --select E9,F63,F7,F82 .

      - name: Run tests
        run: pytest tests/ -v